name: grocery_app
description: Desil Cash & Carry - Bulk & Retail Solutions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  cupertino_icons: ^1.0.9
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  supabase_flutter: ^2.12.2
  intl: ^0.20.2
  smooth_page_indicator: ^2.0.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  cloudinary_public: ^0.23.1
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
